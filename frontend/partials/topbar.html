<header class="topbar seg-topbar">
  <div class="topbar-left">
    <div class="topbar-title">Vigware Monitor</div>
    <div class="topbar-subtitle">
      <span id="wsStatus">Tempo real online</span>
      <span class="separator">•</span>
      <span>Última atualização <strong id="metricUpdated">--:--:--</strong></span>
    </div>
  </div>

  <div class="topbar-right">
    <div class="seg-tray" aria-label="Status do sistema">
      <span class="seg-tray-item" title="Notificações">▤<em>0</em></span>
      <span class="seg-tray-item" title="Rede">◒</span>
      <span class="seg-tray-item" title="Sinais">▥</span>
      <span class="seg-tray-item" title="Operadores">☷</span>
      <span class="seg-tray-item" title="Áudio">◖</span>
    </div>
    <div class="seg-user">
      <strong id="currentUserName">Operador</strong>
      <span id="currentUserRole">Operador</span>
    </div>
    <div class="seg-avatar" id="currentUserAvatar">OP</div>
    <div class="seg-clock" id="segClock">--:--</div>
    <button id="btnRefresh" class="btn primary seg-refresh" type="button">Atualizar</button>
    <button id="btnLogout" class="seg-logout" type="button" title="Sair do Vigware" aria-label="Sair do Vigware">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 5H5v14h5M14 8l4 4-4 4M18 12H9"></path></svg>
    </button>
  </div>
</header>
